# docker-compose.yml
# ========================
# Levanta el stack completo: Postgres + Django (gunicorn) + nginx/React.
#
# Uso en el VPS:
#   1. Copiar .env.example → .env y completar los valores
#   2. docker compose up -d --build
#   3. Acceder via http://IP_VPS   (o el dominio si ya está apuntado)

services:

  # ── Base de datos Postgres ────────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB:       ${POSTGRES_DB:-tesis}
      POSTGRES_USER:     ${POSTGRES_USER:-tesis}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Falta POSTGRES_PASSWORD en .env}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-tesis}"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ── Backend Django (gunicorn) ─────────────────────────────────────────────
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      SECRET_KEY:            ${SECRET_KEY:?Falta SECRET_KEY en .env}
      DEBUG:                 ${DEBUG:-False}
      ALLOWED_HOSTS:         ${ALLOWED_HOSTS:-*}
      # La URL se arma con las variables de Postgres del mismo archivo .env
      DATABASE_URL:          postgres://${POSTGRES_USER:-tesis}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-tesis}
      CORS_ALLOWED_ORIGINS:  ${CORS_ALLOWED_ORIGINS:-}
      CSRF_TRUSTED_ORIGINS:  ${CSRF_TRUSTED_ORIGINS:-}
      FRONTEND_URL:          ${FRONTEND_URL:-}
      USE_X_FORWARDED_HOST:  "True"
    depends_on:
      db:
        condition: service_healthy
    expose:
      - "8000"

  # ── nginx + React (frontend compilado) ───────────────────────────────────
  nginx:
    build:
      context: frontend
      dockerfile: Dockerfile.nginx
      args:
        # URL relativa → nginx hace de intermediario, sin CORS
        VITE_API_BASE_URL: /api
    restart: unless-stopped
    ports:
      # Puerto expuesto en el VPS. Dokploy apunta a este puerto.
      - "${PORT:-80}:80"
    depends_on:
      - backend

volumes:
  postgres_data:
