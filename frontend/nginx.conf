# nginx.conf — sirve el frontend React y delega al backend Django.
#
# Arquitectura:
#   browser → nginx:80
#               ├── /api/*     → gunicorn:8000  (DRF)
#               ├── /admin/*   → gunicorn:8000  (Django Admin)
#               ├── /static/*  → gunicorn:8000  (WhiteNoise)
#               └── /*         → index.html      (SPA React)

server {
    listen 80;
    server_name _;

    # Cabeceras de proxy comunes para que Django sepa el origen real
    proxy_set_header Host              $http_host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_http_version 1.1;

    # --- Backend: API REST ---
    location /api/ {
        proxy_pass http://backend:8000;
    }

    # --- Backend: panel de administración ---
    location /admin/ {
        proxy_pass http://backend:8000;
    }

    # --- Backend: archivos estáticos de Django (WhiteNoise) ---
    location /static/ {
        proxy_pass http://backend:8000;
    }

    # --- Frontend: SPA React ---
    # try_files permite recargar rutas como /dashboard sin 404.
    location / {
        root  /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /index.html;
    }
}
